    if (m) {
      var rom = {'II':2,'III':3,'IV':4,'V':5,'VI':6,'VII':7,'VIII':8,'IX':9,'X':10,
                 'XI':11,'XII':12,'XIII':13,'XIV':14,'XV':15,'XVI':16,'XVII':17,'XVIII':18,
                 'XIX':19,'XX':20,'XXI':21,'XXII':22,'XXIII':23,'XXIV':24,'XXV':25,'XXVI':26,
                 'XXVII':27,'XXVIII':28,'XXIX':29,'XXX':30,'XXXI':31,'XXXII':32,'XXXIII':33,'XXXIV':34};
      var full = m[1] + m[2]; var num = rom[full];
      if (num) file = 'ordinario-' + String(num).padStart(2,'0');
    }
    if (!file) return null;
    var folder;
    if (file.indexOf('ordinario-') === 0) { folder = c + '-ordinario'; }
    else { folder = c + '-tiempos'; }
    return base + folder + '/' + file + '.mp3';
  }

  /* ── STATE ──────────────────────────────────── */
  var currentCycle = 'A';
  var currentMonth = null; // {year, month} 0-indexed
  var selectedKey = null;
  var audioEl = null;

  var MONTHS = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  var DAYS = ['Dom','Lun','Mar','Mi\u00e9','Jue','Vie','S\u00e1b'];
  var CYCLE_YEARS = { 'A': '2025 \u2013 2026', 'B': '2026 \u2013 2027', 'C': '2027 \u2013 2028' };

  /* ── HELPERS ────────────────────────────────── */
  function pad(n) { return n < 10 ? '0' + n : '' + n; }
  function toKey(y, m, d) { return y + '-' + pad(m + 1) + '-' + pad(d); }
  function todayKey() { var d = new Date(); return toKey(d.getFullYear(), d.getMonth(), d.getDate()); }

  /* Get date range for a cycle */
  function getCycleRange(ci) {
    var keys = Object.keys(D).filter(function(k) { return D[k].ci === ci; }).sort();
    if (!keys.length) return null;
    return { first: keys[0], last: keys[keys.length - 1] };
  }

  /* Get sundays in a month that belong to current cycle */
  function getSundaysInMonth(year, month, ci) {
    var result = [];
    var d = new Date(year, month, 1);
    while (d.getMonth() === month) {
      if (d.getDay() === 0) {
        var key = toKey(year, month, d.getDate());
        var lit = D[key];
        if (lit && lit.ci === ci) {
          result.push({ key: key, day: d.getDate(), lit: lit });
        }
      }
      d.setDate(d.getDate() + 1);
    }
    return result;
  }

  /* ── SET CYCLE ──────────────────────────────── */
  function setCycleGlobal(ci) {
    currentCycle = ci;
    /* Update buttons */
    document.querySelectorAll('.cycle-btn').forEach(function(b) {
      b.classList.toggle('active', b.getAttribute('data-cycle') === ci);
    });
    document.getElementById('cycle-label').textContent = CYCLE_YEARS[ci] || '';
    /* Navigate to current month or first month of cycle */
    var range = getCycleRange(ci);
    if (!range) return;
    var today = new Date();
    var tk = todayKey();
    /* If today is within range, show today's month */
    if (tk >= range.first && tk <= range.last) {
      currentMonth = { year: today.getFullYear(), month: today.getMonth() };
    } else {
      var parts = range.first.split('-');
      currentMonth = { year: parseInt(parts[0]), month: parseInt(parts[1]) - 1 };
    }
    selectedKey = null;
    hideDetail();
    renderCalendar();
  }
  window.setCycle = setCycleGlobal;

  /* ── NAV MONTH ──────────────────────────────── */
  function navMonthGlobal(dir) {
    var m = currentMonth.month + dir;
    var y = currentMonth.year;
    if (m < 0) { m = 11; y--; }
    if (m > 11) { m = 0; y++; }
    currentMonth = { year: y, month: m };
    selectedKey = null;
    hideDetail();
    renderCalendar();
  }
  window.navMonth = navMonthGlobal;

  /* ── RENDER CALENDAR ────────────────────────── */
  function renderCalendar() {
    var grid = document.getElementById('cal-grid');
    var title = document.getElementById('cal-month-title');
    var y = currentMonth.year;
    var m = currentMonth.month;

    title.textContent = MONTHS[m] + ' ' + y;

    /* Get sundays with liturgical data */
    var sundays = getSundaysInMonth(y, m, currentCycle);
    var sundayMap = {};
    sundays.forEach(function(s) { sundayMap[s.day] = s; });

    /* Build grid */
    var html = '';
    DAYS.forEach(function(d) {
      html += '<div class="cal-day-header">' + d + '<\/div>';
    });

    var firstDay = new Date(y, m, 1).getDay();
    var daysInMonth = new Date(y, m + 1, 0).getDate();
    var tk = todayKey();

    /* Empty cells before first day */
    for (var i = 0; i < firstDay; i++) {
      html += '<div class="cal-cell empty"><\/div>';
    }

    for (var d = 1; d <= daysInMonth; d++) {
      var key = toKey(y, m, d);
      var dow = new Date(y, m, d).getDay();
      var s = sundayMap[d];
      var cls = 'cal-cell';
      if (s) {
        cls += ' sunday';
        if (selectedKey === s.key) cls += ' active';
        if (key === tk) cls += ' today';
        var hasAudio = getPsalmUrl(s.lit.n, s.lit.ci, s.lit.t) !== null;
        html += '<div class="' + cls + '" data-key="' + s.key + '" onclick="selectSunday(\'' + s.key + '\')">';
        html += d;
        if (hasAudio) html += '<span class="cal-audio-dot"><\/span>';
        html += '<\/div>';
      } else {
        if (key === tk) cls += ' today';
        html += '<div class="' + cls + '">' + d + '<\/div>';
      }
    }

    grid.innerHTML = html;

    /* Update nav button states */
    var range = getCycleRange(currentCycle);
    if (range) {
      var fp = range.first.split('-');
      var lp = range.last.split('-');
      var firstM = parseInt(fp[1]) - 1, firstY = parseInt(fp[0]);
      var lastM = parseInt(lp[1]) - 1, lastY = parseInt(lp[0]);
      document.getElementById('cal-prev').disabled = (y === firstY && m <= firstM);
      document.getElementById('cal-next').disabled = (y === lastY && m >= lastM);
    }
  }

  /* ── SELECT SUNDAY ──────────────────────────── */
  function selectSundayGlobal(key) {
    if (selectedKey === key) {
      selectedKey = null;
      hideDetail();
      renderCalendar();
      return;
    }
    selectedKey = key;
    renderCalendar();
    showDetail(key);
  }
  window.selectSunday = selectSundayGlobal;

  /* ── SHOW DETAIL ────────────────────────────── */
  function showDetail(key) {
    var lit = D[key];
    if (!lit) return;
    var el = document.getElementById('sunday-detail');
    var dd = parseInt(key.slice(8, 10));
    var mm = parseInt(key.slice(5, 7));
    var yyyy = key.slice(0, 4);
    var psUrl = getPsalmUrl(lit.n, lit.ci, lit.t);
    var colHex = COL[lit.c] || '#F5F5F0';

    var h = '<div class="detail-header">';
    h += '<div class="detail-date">' + dd + ' ' + MONTHS[mm - 1].substring(0, 3).toUpperCase() + ' ' + yyyy + ' \u00b7 ' + lit.t + ' \u00b7 Ciclo ' + lit.ci + '<\/div>';
    h += '<div class="detail-name">' + lit.n + '<\/div>';
    if (lit.e) h += '<div class="detail-special">' + lit.e + '<\/div>';
    h += '<\/div>';
    h += '<div class="detail-body">';
    h += '<div class="detail-gospel"><span class="detail-color-dot" style="background:' + colHex + '"><\/span>Evangelio: ' + lit.ev + '<\/div>';
    if (lit.ant) {
      h += '<div style="font-family:\'Cinzel\',serif;font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--gold);margin-bottom:0.2rem;">Ant\u00edfona del Salmo<\/div>';
      h += '<div class="detail-theme">\u00abR/. ' + lit.ant + '\u00bb<\/div>';
    } else {
      h += '<div class="detail-theme">\u00ab' + lit.tema + '\u00bb<\/div>';
    }
    h += '<div class="detail-actions">';
    if (psUrl) {
      h += '<div class="psalm-player" id="psalm-player">';
      h += '<button class="psalm-play-btn" id="psalm-pp" onclick="togglePlay(event)"><svg viewBox="0 0 24 24"><polygon points="8,4 20,12 8,20"\/><\/svg><\/button>';
      h += '<div class="psalm-player-mid"><div class="psalm-progress-wrap" id="psalm-pw" onclick="seekAudio(event)"><div class="psalm-progress-bar" id="psalm-pb"><\/div><\/div>';
      h += '<div class="psalm-time" id="psalm-tm">0:00 / 0:00<\/div><\/div>';
      h += '<button class="psalm-close-btn" onclick="closePlayer(event)"><svg viewBox="0 0 14 14"><line x1="2" y1="2" x2="12" y2="12"\/><line x1="12" y1="2" x2="2" y2="12"\/><\/svg><\/button>';
      h += '<\/div>';
    } else {
      h += '<div class="psalm-no-audio">Audio no disponible para esta fecha<\/div>';
    }
    h += '<a class="detail-link" href="https://www.dominicos.org/predicacion/homilia/' + dd + '-' + mm + '-' + yyyy + '/lecturas/#:~:text=Salmo" target="_blank" rel="noopener">';
    h += '<svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"\/><polyline points="15 3 21 3 21 9"\/><line x1="10" y1="14" x2="21" y2="3"\/><\/svg>';
    h += 'Ver lecturas del domingo<\/a>';
    h += '<\/div><\/div>';

    el.innerHTML = h;
    el.classList.add('visible');

    /* Setup audio */
    if (psUrl) {
      if (audioEl) { audioEl.pause(); audioEl.remove(); }
      audioEl = new Audio(psUrl);
      audioEl.addEventListener('timeupdate', updateProgress);
      audioEl.addEventListener('ended', function() {
        document.getElementById('psalm-pp').innerHTML = '<svg viewBox="0 0 24 24"><polygon points="8,4 20,12 8,20"\/><\/svg>';
      });
    }

    /* Scroll detail into view */
    setTimeout(function() { el.scrollIntoView({ behavior: 'smooth', block: 'nearest' }); }, 100);
  }

  function hideDetail() {
    var el = document.getElementById('sunday-detail');
    el.classList.remove('visible');
    el.innerHTML = '';
    if (audioEl) { audioEl.pause(); audioEl.remove(); audioEl = null; }
  }

  /* ── AUDIO CONTROLS ─────────────────────────── */
  function togglePlayGlobal(e) {
    e.stopPropagation();
    if (!audioEl) return;
    var pp = document.getElementById('psalm-pp');
    if (audioEl.paused) {
      audioEl.play();
      pp.innerHTML = '<svg viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"\/><rect x="14" y="4" width="4" height="16"\/><\/svg>';
    } else {
      audioEl.pause();
      pp.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="8,4 20,12 8,20"\/><\/svg>';
    }
  }
  window.togglePlay = togglePlayGlobal;

  function seekAudioGlobal(e) {
    if (!audioEl || !audioEl.duration) return;
    var rect = document.getElementById('psalm-pw').getBoundingClientRect();
    var pct = (e.clientX - rect.left) / rect.width;
    audioEl.currentTime = pct * audioEl.duration;
  }
  window.seekAudio = seekAudioGlobal;

  function closePlayerGlobal(e) {
    e.stopPropagation();
    if (audioEl) { audioEl.pause(); audioEl.currentTime = 0; }
    var pp = document.getElementById('psalm-pp');
    if (pp) pp.innerHTML = '<svg viewBox="0 0 24 24"><polygon points="8,4 20,12 8,20"\/><\/svg>';
    var pb = document.getElementById('psalm-pb');
    if (pb) pb.style.width = '0';
    var tm = document.getElementById('psalm-tm');
    if (tm) tm.textContent = '0:00 / 0:00';
  }
  window.closePlayer = closePlayerGlobal;

  function updateProgress() {
    if (!audioEl || !audioEl.duration) return;
    var pb = document.getElementById('psalm-pb');
    var tm = document.getElementById('psalm-tm');
    if (pb) pb.style.width = (audioEl.currentTime / audioEl.duration * 100) + '%';
    if (tm) tm.textContent = fmt(audioEl.currentTime) + ' / ' + fmt(audioEl.duration);
  }

  function fmt(s) {
    var m = Math.floor(s / 60);
    var ss = Math.floor(s % 60);
    return m + ':' + (ss < 10 ? '0' : '') + ss;
  }

  /* ── INIT ───────────────────────────────────── */
  /* Auto-select cycle based on current date */
  var today = new Date();
  var tk = todayKey();
  var autoCycle = 'A';
  if (D[tk]) {
    autoCycle = D[tk].ci;
  } else {
    /* Find nearest */
    var keys = Object.keys(D).sort();
    for (var i = 0; i < keys.length; i++) {
      if (keys[i] >= tk) { autoCycle = D[keys[i]].ci; break; }
    }
  }
  setCycleGlobal(autoCycle);

  /* Auto-select today or next sunday */
  if (D[tk] && D[tk].ci === currentCycle) {
    selectSundayGlobal(tk);
  } else {
    /* Find next sunday in current cycle */
    var keys = Object.keys(D).filter(function(k) { return D[k].ci === currentCycle && k >= tk; }).sort();
    if (keys.length) selectSundayGlobal(keys[0]);
  }

})();
</script>
